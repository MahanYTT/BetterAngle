name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build BetterAngle
      run: |
        if (Test-Path bin) { Remove-Item -Recycle -Force bin }
        mkdir bin
        
        # Build Main App
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /Iinclude /Isrc src/main_app/BetterAngle.cpp src/shared/*.cpp /Fe:bin/BetterAngle.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib shell32.lib /SUBSYSTEM:WINDOWS
        
        # Build Config Tool
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /Iinclude /Isrc src/config_tool/BetterAngleConfig.cpp src/shared/*.cpp /Fe:bin/BetterAngleConfig.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib shell32.lib /SUBSYSTEM:WINDOWS

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/BetterAngle.exe
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v4.0.${{ github.run_number }}
        name: BetterAngle Pro v4.0.0.${{ github.run_number }}
        body: |
            BetterAngle v4.0 Pro Edition (Zero-Click Standalone)
            - Professional: Single .exe file (No Zip required!)
            - Feature: Remote Cloud Profiles (Auto-fetched from GitHub)
            - Feature: HUD Status Indicators (Glide/Dive colors)
            - Feature: System Tray Icon for easy Exit
            - Fixed: Unicode degree symbol artifacts (Â°)
