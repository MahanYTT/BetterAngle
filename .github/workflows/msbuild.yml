name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment version on main branch
        # Use author detection instead of [skip ci] to prevent loops
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.author.name != 'github-actions[bot]'
        shell: pwsh
        run: |
          ./scripts/bump_version.ps1
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          $newVersion = (Get-Content VERSION).Trim()
          git add VERSION CMakeLists.txt include/shared/State.h RELEASE_NOTES.md
          git commit -m "chore: auto-increment version to $newVersion"
          git tag "v$newVersion"
          git push origin main --tags

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      - name: Build BetterAngle
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Build uninstaller.exe
        shell: pwsh
        run: |
          cl /std:c++20 /EHsc /O2 /W4 /Fe:build/Release/uninstaller.exe src/shared/uninstall.cpp ole32.lib shell32.lib

      - name: Deploy Qt Dependencies
        shell: pwsh
        run: |
          windeployqt build/Release/BetterAngle.exe --qmldir src/gui --quick --no-translations

      - name: Archive Build
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /dAppVer=$ver installer.iss

      - name: Prepare Release Notes
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $lines = Get-Content RELEASE_NOTES.md
          $outLines = @()
          $seenFirst = $false
          foreach ($line in $lines) {
              if ($line.StartsWith("### ")) {
                  if ($seenFirst) { break }
                  $seenFirst = $true
              }
              if ($seenFirst) { $outLines += $line }
          }
          $outLines | Out-File CURRENT_RELEASE_NOTES.md -Encoding utf8

      - name: Set release metadata
        # Allow metadata to be set on tag push OR bot-triggered main push
        if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && github.event.head_commit.author.name == 'github-actions[bot]')
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION).Trim()
          echo "RELEASE_TAG=v$ver" >> $env:GITHUB_ENV
          echo "RELEASE_NAME=BetterAngle Pro v$ver" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v1
        with:
          files: bin/BetterAngle_Setup.exe
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: CURRENT_RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
