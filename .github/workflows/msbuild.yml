name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'win64_msvc2019_64'
          setup-python: 'false'

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -GNinja

      - name: Build BetterAngle
        run: |
          cd build
          cmake --build . --config Release

      - name: Deploy Qt Dependencies
        run: |
          cd build
          windeployqt Release/BetterAngle.exe --qmldir ../src/gui
          
      - name: Archive Build
        run: |
          cd build/Release
          Compress-Archive -Path * -DestinationPath ../../bin/BetterAngle_Release.zip
      - name: Get Version
        id: get_version
        run: |
          $ver = (Get-Content VERSION).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "TAG=v$ver" >> $env:GITHUB_ENV

      - name: Extract Latest Release Notes
        run: |
          $lines = Get-Content RELEASE_NOTES.md
          $outLines = @()
          $seenFirst = $false
          foreach ($line in $lines) {
              if ($line.StartsWith("### ")) {
                  if ($seenFirst) { break }
                  $seenFirst = $true
              }
              if ($seenFirst) { $outLines += $line }
          }
          $outLines | Out-File CURRENT_RELEASE_NOTES.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/BetterAngle_Release.zip
          tag_name: ${{ env.TAG }}
          name: BetterAngle Pro ${{ env.TAG }}
          body_path: CURRENT_RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
