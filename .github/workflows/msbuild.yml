name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build BetterAngle
      run: |
        if (Test-Path bin) { Remove-Item -Recycle -Force bin }
        mkdir bin
        cl.exe /EHsc /O2 /DUNICODE /D_UNICODE /I include src\*.cpp /Fe:bin\BetterAngle.exe /link user32.lib gdi32.lib gdiplus.lib dwmapi.lib winhttp.lib /SUBSYSTEM:WINDOWS

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: bin/BetterAngle.exe
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
            BetterAngle C++ Release
            - High-performance angle tracking
            - Minimal RAM and CPU footprint
            - Automated GitHub updates
